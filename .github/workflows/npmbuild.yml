name: Node.js CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Use Node.js from .nvmrc
        uses: actions/setup-node@v7
        with:
          node-version-file: '.nvmrc'
      - run: npm ci
      - run: npm run build
